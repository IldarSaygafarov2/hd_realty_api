# Порты — в .env. DB_HOST_PORT — проброс PostgreSQL на хост (если 5432 занят).
# Внутри Docker БД всегда на порту 5432; Django подключается к db:5432.
#
# Management-команды (контейнеры должны быть запущены):
#   docker compose exec web python manage.py fill_districts_categories
#   docker compose exec web python manage.py fill_renovation_types
#   docker compose exec web python manage.py fill_ads
#   docker compose exec web python manage.py fill_ads --clear
# Или разово без запущенного web:
#   docker compose run --rm web python manage.py fill_districts_categories
#   docker compose run --rm web python manage.py fill_renovation_types
#   docker compose run --rm web python manage.py fill_ads

services:
  web:
    build: .
    environment:
      - PYTHONPATH=/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py update_translation_fields 2>/dev/null || true &&
             python manage.py fill_districts_categories &&
             python manage.py fill_renovation_types &&
             python manage.py collectstatic --noinput &&
             python manage.py createsuperuser --noinput 2>/dev/null || true &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 core.wsgi:application"
    volumes:
      - .:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-hd_realty}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
