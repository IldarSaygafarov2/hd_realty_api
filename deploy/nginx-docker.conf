# Nginx в Docker для HD Realty. Проксирует на web:8000.
# Порт задаётся через listen в server block (см. шаблон в docker-compose).

upstream hd_realty_web {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
    }

    # Медиа отдаётся напрямую через nginx — CORS задаёт только nginx, не Django.
    # Без этого фронт с другого origin (например Vite http://localhost:5173) не может
    # загрузить видео/аудио в <video> и при запросах с Range.
    location /media/ {
        alias /app/media/;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range" always;
    }

    location / {
        proxy_pass http://hd_realty_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
